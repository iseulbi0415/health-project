spring.application.name=backend

# MySQL 데이터베이스 연결 설정
# Railway는 MySQL 플러그인을 연결하면 MYSQLHOST/MYSQLPORT/MYSQLUSER/MYSQLPASSWORD/MYSQLDATABASE를
# 자동으로 주입함 — 있으면 그 값, 없으면(로컬 개발) : 뒤의 기존 로컬 설정을 그대로 씀
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:health_project}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# HikariCP 커넥션 풀 — 기본 최대 10개는 지금 트래픽 규모엔 과함, Railway MySQL도 동시 연결 수 제한이 있어서
# 넉넉하게 열어두면 자원만 잡아먹음. DB_POOL_SIZE로 배포 환경에서 필요하면 조정 가능하게 열어둠
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2
# 커넥션을 못 받으면 10초 만에 에러 내고 포기(기본 30초) — 응답이 계속 느려지다 멈추는 대신 빨리 실패해서 원인 파악이 쉬워짐
spring.datasource.hikari.connection-timeout=10000
# 커넥션은 30분 넘으면 강제로 새로 맺음 — 오래돼 죽어있는 커넥션이 풀에 남아있는 걸 방지
spring.datasource.hikari.max-lifetime=1800000

# Railway는 배포마다 포트를 동적으로 할당하고 PORT 환경변수로 알려줌 — 로컬은 그대로 8080
server.port=${PORT:8080}

# 로그인 성공 후 리다이렉트 + CORS 허용 출처로 같이 씀(SecurityConfig). 배포 시 FRONTEND_URL 환경변수로 교체,
# 로컬 개발은 기본값(Live Server 주소) 그대로 사용
app.frontend-url=${FRONTEND_URL:http://localhost:5500}

# Railway 등 프록시 뒤에서 실행될 때 X-Forwarded-* 헤더를 신뢰해서 원래 요청의 scheme(https)을 올바르게 인식하게 함
# — 없으면 카카오 redirect-uri의 {baseUrl}이 http로 잘못 계산되어 카카오 콘솔에 등록한 https 주소와 안 맞음
server.forward-headers-strategy=framework

# 세션 쿠키(JSESSIONID) SameSite/Secure 설정 — 프론트(Vercel)와 백엔드(Railway)가 서로 다른 도메인이라
# 크로스 사이트로 취급돼 SameSite=None이 필요한데, SameSite=None은 Secure 없이는 브라우저가 쿠키를 버림.
# 로컬은 프론트/백엔드가 둘 다 localhost(포트만 다름)라 같은 사이트로 취급되어 기본값(Lax)이면 충분하고,
# 오히려 로컬이 http라서 Secure를 강제하면 쿠키가 안 붙어 로그인 세션이 깨짐 — 그래서 환경별로 분기
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# 세션 타임아웃 30분 — 처음엔 15분까지 줄였었는데(카카오 로그인만 누르고 이탈한 세션이 메모리에 오래
# 쌓이는 걸 막으려던 것) 실사용엔 너무 짧아서 저장 도중 세션이 끊기는 일이 잦았음. 프론트에서 401을
# 감지해 즉시 로그인 게이트로 안내하도록 고친 뒤로는(app.js apiFetch) 세션이 끊겨도 당황하지 않고 바로
# 재로그인하면 되므로, 유휴 세션이 쌓이는 시간을 여전히 제한하면서 체감은 훨씬 나은 30분으로 절충함
server.servlet.session.timeout=30m

# JPA 설정 - 서버 켤 때마다 테이블 자동 생성/업데이트
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# REST API라 뷰 렌더링이 없는데 기본값(true)이면 요청이 끝날 때까지 DB 커넥션을 계속 붙잡고 있어서
# 커넥션 풀 부담만 늘어남 — 꺼서 Repository 호출 끝나면 바로 커넥션이 반납되게 함
spring.jpa.open-in-view=false

# 한글 인코딩 강제 설정 (UTF-8)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 카카오 REST API 키/시크릿처럼 git에 올리면 안 되는 값은 이 파일에서 분리해서 불러옴
# optional: 접두사 — application-secret.properties가 아직 없어도(예: 새로 클론한 직후) 앱이 죽지 않게
spring.config.import=optional:application-secret.properties

# Railway Variables 이름에 점(.)이 들어가면 빌드 도구(mise)가 자기 문법으로 오인해 충돌하므로
# 배포용 환경변수명은 언더스코어로 씀(KAKAO_CLIENT_ID/SECRET). 없으면(로컬 개발) 중첩 기본값으로
# application-secret.properties의 기존 kakao.client-id/secret 프로퍼티를 그대로 씀
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:${kakao.client-id}}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:${kakao.client-secret}}
# 카카오 콘솔에서 Client Secret이 활성화(ON) 상태로 확인됨 — 비활성화 상태였다면 none으로 써야 함
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# {baseUrl}은 요청 기준으로 자동 계산됨(위 forward-headers-strategy 덕분에 배포 환경에서도 https로 정확히 계산됨)
# 카카오 개발자센터엔 로컬용(http://localhost:8080/login/oauth2/code/kakao)과 배포용
# (https://health-project-production-5204.up.railway.app/login/oauth2/code/kakao) Redirect URI를 둘 다 등록해둘 것
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao

# 카카오는 Spring Security 기본 제공 provider(google/github 등)에 없어서 엔드포인트를 직접 지정해야 함
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 식약처 식품영양성분DB 오픈API 인증키 — 카카오 키와 동일한 패턴(배포는 언더스코어 환경변수,
# 로컬은 application-secret.properties의 mfds.service-key)
food.api.service-key=${MFDS_SERVICE_KEY:${mfds.service-key}}
